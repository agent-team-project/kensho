# Skills available to the `verifier` agent at runtime.
#
# The verifier is a deterministic gate runner. It needs provider access for
# branch/PR metadata, status for observability, inbox/channel for daemon
# coordination, and verify for the evidence-producing gate runner.
[skills]
extra = ["verify", "visual-qa", "github", "status", "inbox", "channel"]
