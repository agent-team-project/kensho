# Manifest for the bundled "default" template. Its slim profile is the default
# external-consumer starter; the full profile preserves this repo's self-dogfood
# topology.
#
# `agent-team init` reads this file to determine which parameters the consumer
# must supply; values flow into config.toml.tmpl below to produce the repo's
# resolved .agent_team/config.toml.

[template]
name        = "default"
version     = "1.0.0"
description = "Slim manager + worker + reviewer starter by default; full profile adds ticket-manager, scheduled loops, and the self-dogfood topology."

[[parameter]]
key         = "project.id"
type        = "string"
default     = ""
description = "Stable repo/team project identity generated by agent-team init."

[[parameter]]
key         = "project.parent_uri"
type        = "string"
default     = ""
description = "Optional parent deployment URI for nested or dynamically created teams."

[[parameter]]
key         = "template.profile"
type        = "string"
default     = "slim"
pattern     = "^(slim|full)$"
description = "Bundled template profile: slim is the external-consumer starter; full is the self-dogfood topology with scheduled governance loops."

[[parameter]]
key         = "linear.team_id"
type        = "string"
default     = ""
required_when_key = "pm.provider"
required_when_value = "linear"
description = "Linear team UUID. Required only when pm.provider is linear."

[[parameter]]
key         = "linear.ticket_prefix"
type        = "string"
default     = ""
required_when_key = "pm.provider"
required_when_value = "linear"
pattern     = "^[A-Z]{2,5}$"
description = "Linear ticket prefix, e.g. SQU. Required only when pm.provider is linear."

[[parameter]]
key         = "linear.agent_column"
type        = "string"
default     = "Ready for Agent"
description = "Linear workflow column that dispatches the default ticket_to_pr pipeline when a card is moved into it."

[[parameter]]
key         = "linear.agent_user_id"
type        = "string"
default     = ""
description = "Optional Linear user UUID for the agent API key; status-change webhooks authored by this user are ignored to prevent dispatch loops."

[[parameter]]
key         = "linear.in_progress_state"
type        = "string"
default     = "In Progress"
description = "Linear workflow state name used when a job is dispatched or bounced back to implementation."

[[parameter]]
key         = "linear.attention_state"
type        = "string"
default     = ""
description = "Optional Linear workflow state name used when a job fails and needs attention."

[[parameter]]
key         = "linear.initiative_id"
type        = "string"
required    = false
description = "Optional initiative UUID to attach new tickets to."

[[parameter]]
key         = "linear.labels"
type        = "list<string>"
default     = []
description = "Labels to apply to all created tickets."

[[parameter]]
key         = "github.owner"
type        = "string"
default     = ""
required_when_key = "pm.provider"
required_when_value = "github"
description = "GitHub repository owner or organization. Required only when pm.provider is github."

[[parameter]]
key         = "github.repo"
type        = "string"
default     = ""
required_when_key = "pm.provider"
required_when_value = "github"
description = "GitHub repository name. Required only when pm.provider is github."

[[parameter]]
key         = "github.agent_column"
type        = "string"
default     = "Ready for Agent"
description = "GitHub Projects status option that dispatches the default ticket_to_pr pipeline when an issue item is moved into it."

[[parameter]]
key         = "github.agent_login"
type        = "string"
default     = ""
description = "Optional GitHub login for the agent token; worker GitHub auth verifies this actor and project status webhooks authored by this login are ignored to prevent dispatch loops."

[[parameter]]
key         = "github.agent_id"
type        = "string"
default     = ""
description = "Optional numeric GitHub actor id for the agent token; used when agent_login is not set."

[[parameter]]
key         = "github.in_progress_state"
type        = "string"
default     = "open"
description = "GitHub issue state used when a job is dispatched or bounced back to implementation."

[[parameter]]
key         = "github.attention_state"
type        = "string"
default     = "open"
description = "GitHub issue state used when a job fails and needs attention."

[[parameter]]
key         = "github.in_progress_label"
type        = "string"
default     = ""
description = "Optional GitHub issue label applied when work starts or is bounced back."

[[parameter]]
key         = "github.attention_label"
type        = "string"
default     = ""
description = "Optional GitHub issue label applied when a job fails and needs attention."

[[parameter]]
key         = "github.labels"
type        = "list<string>"
default     = []
description = "GitHub labels to apply on all provider write-backs."

[[parameter]]
key         = "github.project_owner"
type        = "string"
default     = ""
description = "Optional GitHub Projects owner; defaults to github.owner when project_number is set."

[[parameter]]
key         = "github.project_number"
type        = "int"
default     = 0
description = "Optional GitHub Projects v2 number for status write-back."

[[parameter]]
key         = "github.project_status_field"
type        = "string"
default     = "Status"
description = "GitHub Projects single-select field used for board status write-back."

[[parameter]]
key         = "github.in_progress_column"
type        = "string"
default     = "In Progress"
description = "GitHub Projects status option used when a job is dispatched or bounced back."

[[parameter]]
key         = "github.attention_column"
type        = "string"
default     = "Todo"
description = "GitHub Projects status option used when a job fails and needs attention."

[[parameter]]
key         = "pm.provider"
type        = "string"
default     = "none"
pattern     = "^(none|linear|github)$"
description = "Which PM provider the team talks to. Use none for ticketless jobs, linear for Linear-backed tickets, or github for GitHub Issues/Projects."

[[parameter]]
key         = "team.pm_tool"
type        = "string"
default     = "none"
pattern     = "^(none|linear|github)$"
description = "Deprecated alias for pm.provider. Kept for compatibility with existing configs and scripts."

[[parameter]]
key         = "skills.team"
type        = "list<string>"
default     = []
description = "Shared skills under .agent_team/skills/ that should be registered for every launched agent."

[[parameter]]
key         = "otel.enabled"
type        = "bool"
default     = false
description = "Enable runtime-owned OpenTelemetry export propagation. Disabled means no OTEL env vars, Codex config args, or TRACEPARENT are injected."

[[parameter]]
key         = "otel.endpoint"
type        = "string"
default     = ""
description = "OTLP/HTTP collector endpoint used when otel.enabled is true."

[[parameter]]
key         = "health.status_stale_after"
type        = "string"
default     = "10m"
description = "How old a non-idle/non-done status.toml can be before instance views mark it stale. Set to 0 to disable status staleness."

[[parameter]]
key         = "health.job_stale_after"
type        = "string"
default     = "24h"
description = "How old a queued or running job update can be before triage marks it stale. Set to 0 to disable job staleness."

[[parameter]]
key         = "health.terminal_retention"
type        = "string"
default     = "0"
description = "How long terminal jobs and daemon instance records remain in the live registry before maintenance archives them. Set to 14d to retain two weeks, or 0 to disable archival."

[[parameter]]
key         = "notifications.phase_transitions"
type        = "list<string>"
default     = ["blocked"]
description = "Status phase transitions the daemon publishes to #supervisor. Supported values: idle, blocked."

[[parameter]]
key         = "notifications.idle_renotify"
type        = "string"
default     = "0"
description = "How often to repeat an idle notification while an instance remains idle. Set to 0 to disable repeats."

[profiles.slim]
description = "External-consumer starter: manager, worker, reviewer, core provider skills, and the ticket_to_pr pipeline only."
exclude = [
  "agents/auditor",
  "agents/comms",
  "agents/ticket-manager",
  "skills/comms",
  "skills/docs-freshness",
  "skills/product-verify",
  "skills/release",
  "skills/review-harness",
  "skills/sentinel",
  "skills/triage-feedback",
]

[profiles.full]
description = "Full self-dogfood topology with platform, quality, release, docs, comms, and sentinel loops."
exclude = []
