# Manifest for the bundled "default" template — a software-engineering team
# (manager + worker + ticket-manager) for Linear-tracked work.
#
# `agent-team init` reads this file to determine which parameters the consumer
# must supply; values flow into config.toml.tmpl below to produce the repo's
# resolved .agent_team/config.toml.

[template]
name        = "default"
version     = "1.0.0"
description = "Manager + worker + ticket-manager team for Linear-tracked engineering work."

[[parameter]]
key         = "linear.team_id"
type        = "string"
required    = true
description = "Linear team UUID. Find at linear.app/<workspace>/team/<TEAM>/all (UUID is in the URL)."

[[parameter]]
key         = "linear.ticket_prefix"
type        = "string"
required    = true
pattern     = "^[A-Z]{2,5}$"
description = "Linear ticket prefix, e.g. SQU."

[[parameter]]
key         = "linear.initiative_id"
type        = "string"
required    = false
description = "Optional initiative UUID to attach new tickets to."

[[parameter]]
key         = "linear.labels"
type        = "list<string>"
default     = []
description = "Labels to apply to all created tickets."

[[parameter]]
key         = "team.pm_tool"
type        = "string"
default     = "linear"
description = "Which PM tool the team talks to. v1 only supports linear."

[[parameter]]
key         = "health.status_stale_after"
type        = "string"
default     = "10m"
description = "How old a non-idle/non-done status.toml can be before instance views mark it stale. Set to 0 to disable status staleness."

[[parameter]]
key         = "health.job_stale_after"
type        = "string"
default     = "24h"
description = "How old a queued or running job update can be before triage marks it stale. Set to 0 to disable job staleness."

[[parameter]]
key         = "health.terminal_retention"
type        = "string"
default     = "0"
description = "How long terminal jobs and daemon instance records remain in the live registry before maintenance archives them. Set to 14d to retain two weeks, or 0 to disable archival."
