name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps (pyyaml for frontmatter validator)
        run: pip install --no-cache-dir pyyaml==6.0.2

      - name: Validate TOML files
        run: python3 scripts/ci/validate_toml.py

      - name: Validate agent & skill frontmatter
        run: python3 scripts/ci/validate_frontmatter.py

      - name: Install agent-team CLI
        run: pip install --quiet ./cli

      - name: CLI smoke test (init + add + doctor)
        run: python3 scripts/ci/smoke_init.py

      - name: Shellcheck template scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: cli/src/agent_team/template/skills/linear/scripts
          severity: warning

  go:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build -o bin/agent-team-go ./cmd/agent-team

      - name: CLI smoke test (Go init)
        run: python3 scripts/ci/smoke_init_go.py bin/agent-team-go
