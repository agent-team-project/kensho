name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # Python 3.11 is preinstalled on ubuntu-latest. The validators and the
      # smoke harness use stdlib only (`tomllib` from 3.11+, `pathlib`,
      # `subprocess`) — pyyaml is the lone third-party dep, used only by the
      # frontmatter validator.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml (frontmatter validator)
        run: pip install --no-cache-dir pyyaml==6.0.2

      - name: Validate TOML files
        run: python3 scripts/ci/validate_toml.py

      - name: Validate agent & skill frontmatter
        run: python3 scripts/ci/validate_frontmatter.py

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: |
          go build -o bin/agent-team ./cmd/agent-team
          go build -o bin/agent-teamd ./cmd/agent-teamd

      - name: CLI smoke test (init + template + doctor)
        run: python3 scripts/ci/smoke_init.py bin/agent-team

      - name: Shellcheck template scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: template/skills/linear/scripts
          severity: warning
