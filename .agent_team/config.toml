# agent-team config for agent-team itself (self-dogfooding).
#
# Read at runtime by skills under template/skills/*/ via inline Python.
# Committed so teammates share the same config. No secrets here — API keys
# live in .env.

[pm]
provider = "github"

[linear]
team_id       = "72986798-f8b4-4f57-afe2-c76d4868db0f"   # SquirtleSquad team (key: SQU)
ticket_prefix = "SQU"
agent_column  = "Ready for Agent"
in_progress_state = "In Progress"
attention_state = "Todo"
initiative_id = "b4266442-de88-4000-82ba-0d24054d827c"   # Version 1.0
labels        = []                                         # no label conventions yet

# Projects under Version 1.0.
# Used by ticket-manager for routing new tickets (to be added in M5).
[linear.projects]
foundation         = "3d07030a-a372-41a2-b01e-1b4116d0f151"   # plugin scaffolding & research (Completed)
skill_extraction   = "50b6cd55-5760-4fd3-9bbe-acb17e544aa2"   # pull-request & linear
agent_extraction   = "d51edd22-00be-4a24-b9a8-01d27187717b"   # worker, assign-worker, ticket-manager
self_dogfooding    = "f8a115f9-dea7-4927-a214-c0da54c6a7c0"   # v1 sign-off

[health]
# SQU-40: archive terminal jobs + daemon records older than this into
# .agent_team/daemon/archive/YYYY-MM.jsonl during maintenance ticks.
terminal_retention = "14d"

[notifications]
phase_transitions = ["blocked"]
idle_renotify = "0"

[runtime]
kind = "codex"
binary = "codex"

# Feedback routing for the triage-feedback schedule (see that skill).
# This repo IS the framework repo, so local and upstream are the same board.
[feedback]
upstream = "agent-team"

[feedback.routes.agent-team]
kind     = "linear"
team_key = "SQU"
label    = "feedback"

[project]
id = "a1290ed4-258f-4706-964b-c1aa3d82f6fc"

[github]
owner = "agent-team-project"
repo = "kensho"
agent_login = "agent-team-project"
project_number = 1
project_status_field = "Status"
agent_column = "Ready for Agent"
