cutover:
  schema: agent-team.tui-cutover-oracle.v1
  mode: single_pr
  phase: parity-screens-and-early-cutover
  zero_new_daemon_api_required: true
  invariant: >-
    The web surface, its auth exception, browser verification, obsolete docs,
    and the guards preventing their return all change atomically on one manually
    approved PR head.

  integration_proof:
    target_ref_source: pull_request.baseRefName
    target_head_definition: >-
      The freshly fetched current head SHA of the PR target ref, never a merge
      base, cached checkout, or the target SHA from when the cutover branch forked.
    cutover_head_definition: the exact tested PR head SHA
    synthetic_merge:
      command_contract: git merge-tree --write-tree "$TARGET_HEAD" "$CUTOVER_HEAD"
      clean_merge_required: true
      output: integration_result_tree
    coupled_revisions:
      source_inventory_digest: target_head
      removals_and_path_absence: integration_result_tree
      required_rewrites: integration_result_tree
      auth_regression: integration_result_tree
      permanent_lints: integration_result_tree
      acceptance_gates: integration_result_tree
    coupling_rule: >-
      All evaluations belong to this one (target_head, cutover_head,
      integration_result_tree) tuple. Freshness reads the pre-deletion target
      input because the result must contain no inventoried sources; all deletion,
      absence, rewrite, auth, and lint evaluations read the tuple's result tree.
      No evaluation may substitute a merge base, branch-only tree, or separately
      resolved target revision.
    target_head_guard:
      before_gate: target_head equals the freshly fetched target ref head
      immediately_before_merge: target_head still equals the target ref head
      merge_precondition: >-
        The provider merge or merge-queue operation is conditional on the
        recorded target_head SHA; it must reject rather than integrate onto a
        different target head.
      on_mismatch: >-
        Invalidate all evidence, fetch the new target head, rebuild the synthetic
        integration result, and rerun source freshness plus every cutover gate.
    evidence_file_keys:
      - target_ref
      - target_head_sha
      - cutover_head_sha
      - integration_result_tree
      - clean_merge

  parity:
    disposition_rule: "all(capabilities, status in semantics.allowed_statuses)"
    covered_rule: "all(capabilities[status=covered], evidence.length > 0)"
    dropped_rule: "all(capabilities[status=dropped-by-decision], decision != '')"
    required_coverage_percent: 100
    evidence_file: documentation/tui/cutover-evidence.yaml
    evidence_must_match_head_sha: true
    source_freshness:
      integration_proof_ref: cutover.integration_proof
      comparison_revision: integration_proof.target_head
      digest_contract_ref: source_inventory.digest
      rule: >-
        digest(integration_proof.target_head, source_inventory.digest.scope) ==
        source_inventory.digest.value
      fail_closed: true
      evidence_file_keys:
        - source_inventory_base_commit
        - source_inventory_expected_digest
        - target_head_source_actual_digest
        - inventory_review_url
      equality_requirements:
        - integration_proof.cutover_head_sha equals the exact tested PR head SHA
        - integration_proof.target_head_sha equals the current PR target head SHA
        - integration_proof.integration_result_tree is the clean synthetic merge output
        - source_inventory_base_commit equals source_inventory.base_commit
        - source_inventory_expected_digest equals source_inventory.digest.value
        - target_head_source_actual_digest equals source_inventory.digest.value
        - every removal and path-absence assertion passes on integration_result_tree
      mismatch_remediation: >-
        Stop deletion, regenerate and re-review every capability and route shape
        against the changed source scope, update base_commit and digest.value in
        a separate reviewed inventory revision, then rebuild the integration
        proof and rerun the entire cutover oracle.

  acceptance_gates:
    required:
      - unit
      - golden
      - pty
      - term-dumb
      - live-daemon
      - non-tty
      - cutover-lints
      - performance
      - soak
    canonical_geometries:
      - 80x24
      - 120x30
      - 160x50
    render_modes:
      - color
      - NO_COLOR
      - TERM=dumb
    consecutive_identical_golden_runs: 2
    layout_contract:
      classification_precedence:
        - class: too-small
          predicate: width < 60 or height < 16
        - class: compact
          predicate: width < 100 or height < 27
        - class: standard
          predicate: width < 145 or height < 40
        - class: wide
          predicate: otherwise
      evaluation: first matching predicate wins
      totality_property: >-
        For every non-negative integer width and height exactly one class is
        returned; after too-small exactly one of compact, standard, or wide is
        returned.
      exhaustive_test_domain:
        width: 0..320
        height: 0..120
      boundary_cases:
        - {geometry: 59x50, class: too-small}
        - {geometry: 60x15, class: too-small}
        - {geometry: 60x16, class: compact}
        - {geometry: 99x50, class: compact}
        - {geometry: 100x26, class: compact}
        - {geometry: 100x27, class: standard}
        - {geometry: 100x40, class: standard}
        - {geometry: 120x50, class: standard}
        - {geometry: 144x40, class: standard}
        - {geometry: 145x27, class: standard}
        - {geometry: 145x30, class: standard}
        - {geometry: 160x30, class: standard}
        - {geometry: 145x39, class: standard}
        - {geometry: 145x40, class: wide}
        - {geometry: 160x50, class: wide}
      canonical_source_frames:
        file: documentation/tui/SPEC.md
        encoding: ASCII
        implicit_margins: false
        frames:
          - {heading: "### 80×24 — compact overview", fence: text, columns: 80, rows: 24}
          - {heading: "### 120×30 — standard jobs", fence: text, columns: 120, rows: 30}
          - {heading: "### 160×50 — wide topology", fence: text, columns: 160, rows: 50}
        row_assertion: each source row has exactly the declared columns cells
        height_assertion: each source fence contains exactly its declared number of rows
        pane_junctions:
          - {frame: 120x30, pane: Jobs/Detail, source_rows: 5..14, column: 70}
          - {frame: 160x50, pane: Live-org/Context, source_rows: 3..13, column: 105}
          - {frame: 160x50, pane: Pipelines/Budgets, source_rows: 14..19, column: 73}
          - {frame: 160x50, pane: Schedules/Teams, source_rows: 20..24, column: 73}
          - {frame: 160x50, pane: Deployments/Deadlines, source_rows: 25..47, column: 73}
        pane_junction_assertion: >-
          For every inclusive source-row span, each row has ASCII | or + at the
          declared one-based column and has no junction for that pane at either
          adjacent column. Header/opening, content, separator, and closing rows
          are all checked; correct outer dimensions alone are insufficient.
    zero_environment_discovery:
      required_gate: live-daemon
      fixture: tui-small-v1 in a fresh temporary repository
      unset_environment:
        - AGENT_TEAM_DAEMON_URL
        - AGENT_TEAM_DAEMON_TOKEN_FILE
        - AGENT_TEAM_DAEMON_SOCKET
      precedence_contract:
        - AGENT_TEAM_DAEMON_URL when explicitly set
        - persisted daemon HTTP address
        - live pidfile plus derived Unix socket
      http_token_file_precedence:
        - AGENT_TEAM_DAEMON_TOKEN_FILE when explicitly set
        - repository operator-token path
      required_live_scenarios:
        - id: persisted-http-wins-without-environment
          arrange:
            - persisted HTTP address exists and accepts authenticated requests
            - live pidfile and Unix socket also exist
            - default operator-token file contains the seeded daemon token
          assert:
            - selected transport is the persisted HTTP address
            - selected token file is the default operator-token path
            - the first snapshot request is authenticated and succeeds
            - no token or endpoint prompt is rendered
        - id: unix-socket-fallback-without-environment
          arrange:
            - persisted HTTP address is absent
            - live pidfile and derived Unix socket exist
          assert:
            - selected transport is the derived Unix socket
            - the first snapshot request succeeds
            - no token or endpoint prompt is rendered
        - id: stale-local-transport-fails-closed
          arrange:
            - persisted HTTP address is absent
            - pidfile is dead or the derived socket is absent
          assert:
            - discovery reports daemon not running
            - no guessed URL or socket is attempted
      evidence_must_record:
        - selected transport kind and address or socket path
        - selected token-file path without token contents
        - authenticated daemon response identity
    term_dumb:
      required_gate: term-dumb
      environment:
        TERM: dumb
        NO_COLOR: unset
      render_geometries:
        - 80x24
        - 120x30
        - 160x50
      border_glyph_bytes_allowed:
        - 2b  # +
        - 2d  # -
        - 7c  # |
      forbidden_unicode_ranges:
        - U+2500..U+257F  # box drawing
      forbidden_byte_sequence_prefixes:
        - 1b5b  # ESC [, all CSI including cursor addressing and SGR/color
        - 1b5d  # ESC ], all OSC
      forbidden_bytes:
        - 1b  # ESC: rejects every 7-bit escape form, including ESC 7 / ESC 8
        - 9b  # 8-bit C1 CSI
        - 9d  # 8-bit C1 OSC
      raw_byte_assertion: >-
        Scan the complete render and PTY capture before decoding text and fail if
        any forbidden byte occurs anywhere; prefix-only matching is insufficient.
      no_color_dependency_assertion: >-
        Normalized textual status, focus, and control labels equal the NO_COLOR
        frame; color or glyph shape is never the only signal.
      pty_geometry: 80x24
      pty_input_sequence:
        - Tab
        - ArrowDown
        - Enter
        - /
        - text: status:active
        - Enter
        - r
        - "?"
        - "?"
        - q
      pty_assertions:
        - focus traversal remains visible with the ASCII > marker
        - inspect opens readable detail
        - filtering changes the visible result set
        - refresh dispatches and reports completion
        - help opens, lists bindings, and closes
        - quit exits cleanly
        - captured output contains neither forbidden byte-sequence prefix
        - captured output contains none of the forbidden bytes
    large_fixture:
      instances: 100
      jobs: 500
    max_first_paint_after_api_response_ms: 150
    soak_duration: 1h

  removal_evaluation_revision: integration_proof.integration_result_tree
  removals:
    - id: embedded-ui-directory
      kind: path_absent
      path: internal/daemon/ui
      includes:
        - internal/daemon/ui/index.html
        - internal/daemon/ui/app.js
        - internal/daemon/ui/styles.css
        - internal/daemon/ui/app_test.mjs
    - id: embedded-ui-handler
      kind: path_absent
      path: internal/daemon/ui.go
    - id: browser-product-verifier
      kind: path_absent
      path: template/skills/product-verify/scripts/product_verify_browser.py
    - id: browser-product-verifier-tests
      kind: path_absent
      path: scripts/skills/product-verify/product_verify_browser_test.py

  required_rewrites:
    - id: product-verify-skill
      path: template/skills/product-verify/SKILL.md
      must_remove:
        - product_verify_browser.py
        - playwright
        - /ui
      must_add_concepts:
        - PTY verification
        - --once verification
        - API and CLI ground-truth comparison
    - id: product-verify-documentation
      path: documentation/product-verify.md
      must_remove:
        - playwright
        - /ui
        - browser dashboard
      must_add_concepts:
        - terminal UI
        - PTY
        - --once
    - id: product-verify-schedule-monolith
      path: template/instances.toml.tmpl
      must_remove:
        - daemon UI endpoints
      must_add_concepts:
        - terminal UI
    - id: product-verify-schedule-fragment
      path: template/topology/instances.toml.tmpl.d/50_full_quality_loops.toml.tmpl
      must_remove:
        - daemon UI endpoints
      must_add_concepts:
        - terminal UI

  obsolete_web_documentation:
    policy: rewrite_or_delete
    paths:
      - README.md
      - docs/reference/runtime-api.md
      - docs/contributing/roadmap.md
      - docs/getting-started.md
      - docs/guide/architecture.md
      - docs/runtime/daemon.md
      - docs/guide/quickstart.md
      - documentation/product-verify.md
      - documentation/ui-design.md
    forbidden_user_guidance:
      - open /ui
      - embedded dashboard
      - browser token field
    architecture_history_exceptions:
      - documentation/tui/SPEC.md
      - documentation/tui/parity.yaml
      - documentation/tui/ADR-001-charm-stack.md

  route_and_auth:
    forbidden_route_literals:
      - /ui
      - /ui/
    forbidden_route_registration_regex: 'mux[.]Handle(Func)?[(]"/ui/?"'
    forbidden_auth_symbol: isStaticUIPath
    forbidden_auth_concept: unauthenticated static UI shell
    dedicated_regression:
      file: internal/daemon/http_test.go
      test: TestHTTP_TCPRoutesRequireBearerAfterUICutover
      assertions:
        - unauthenticated TCP GET /ui returns 401 under the normal bearer policy
        - authenticated TCP GET /ui returns 404
        - unauthenticated TCP GET /ui/ returns 401 under the normal bearer policy
        - authenticated TCP GET /ui/ returns 404
        - unauthenticated TCP GET /ui/app.js returns 401 under the normal bearer policy
        - authenticated TCP GET /ui/app.js returns 404
        - unauthenticated TCP GET /v1/instances remains 401
        - authenticated TCP GET /v1/instances remains 200

  permanent_lints:
    - id: no-embedded-daemon-web-assets
      scope:
        - internal/daemon
      reject:
        globs:
          - '**/*.html'
          - '**/*.js'
          - '**/*.css'
        regex:
          - '//go:embed[[:space:]].*(ui|[.]html|[.]js|[.]css)'
    - id: no-ui-route
      scope:
        - internal/daemon/**/*.go
      exclude:
        - internal/daemon/**/*_test.go
      reject:
        regex:
          - 'mux[.]Handle(Func)?[(]"/ui/?"'
    - id: no-static-ui-auth-exception
      scope:
        - internal/daemon/**/*.go
      exclude:
        - internal/daemon/**/*_test.go
      reject:
        literals:
          - isStaticUIPath
          - unauthenticated static UI shell
    - id: no-daemon-html-handler
      scope:
        - internal/daemon/**/*.go
      exclude:
        - internal/daemon/**/*_test.go
      reject:
        literals:
          - text/html
    - id: no-playwright-product-verification
      scope:
        - template/skills/product-verify
        - scripts/skills/product-verify
        - .github/workflows
        - documentation/product-verify.md
        - package.json
        - package-lock.json
        - pyproject.toml
        - requirements.txt
      reject_case_insensitive:
        literals:
          - playwright
          - product_verify_browser
    - id: no-user-facing-web-dashboard-docs
      scope:
        - README.md
        - docs
        - documentation
      exclude:
        - documentation/tui
      reject_case_insensitive:
        regex:
          - '(^|[^[:alnum:]_])/ui(/|[^[:alnum:]_]|$)'
          - 'embedded[[:space:]-]+(web[[:space:]-]+)?dashboard'
          - 'browser[[:space:]-]+dashboard'
    - id: agent-teamd-remains-charm-free
      command_contract: go list -deps ./cmd/agent-teamd
      reject_prefix: github.com/charmbracelet/

  api_stability:
    routes_that_must_remain_behaviorally_unchanged:
      - GET /v1/instances
      - GET /v1/jobs
      - GET /v1/topology
      - GET /v1/resources?uri={resource_uri}
    permitted_daemon_production_edits:
      - delete internal/daemon/ui.go
      - remove /ui handler construction and registration from internal/daemon/http.go
      - remove the static UI bypass from internal/daemon/http_auth.go
    forbid_other_v1_route_add_remove_or_behavior_change: true

  changelog:
    path: CHANGELOG.md
    required_concepts:
      - the embedded web dashboard was removed
      - agent-team ui is the sole human UI
      - no redirect
      - no compatibility shim

  compatibility:
    redirects_allowed: false
    shims_allowed: false
    dual_ui_allowed_after_merge: false

  manual_approval:
    provider: github
    repository: agent-team-project/kensho
    approver: James
    approver_login_source: repository_variable.TUI_CUTOVER_APPROVER
    required_review_state: APPROVED
    review_commit_id_must_equal_pr_head_sha: true
    approval_must_follow_all_cutover_changes: true
    machine_gate_without_matching_review_must_fail: true
