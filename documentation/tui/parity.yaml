schema: agent-team.tui-parity.v1
work_item: https://github.com/agent-team-project/kensho/issues/383
epic: https://github.com/agent-team-project/kensho/issues/153
purpose: >-
  Planned disposition of every capability in the embedded daemon dashboard and
  the machine-readable oracle for the later, single-PR terminal UI cutover.

semantics:
  allowed_statuses:
    - covered
    - dropped-by-decision
  covered: >-
    The future TUI screen is contractually required to reproduce the current
    capability. This does not mean it is implemented in the GH-383 spec slice.
  dropped-by-decision: >-
    The browser-specific capability is intentionally absent from the TUI and
    has a required decision citation.
  cutover_complete: >-
    Every covered row has passing evidence, every dropped row has a decision,
    the current-target integration source digest is current, and every cutover
    oracle condition is satisfied on the same recorded integration result.

source_inventory:
  base_commit: f206f0f0503a0b4e841e9919b6c221793430dfe8
  revision_basis: gh-383 working tree at 2026-07-10
  digest:
    algorithm: sha256
    serialization: git-ls-tree-r-z-full-tree
    command_contract: >-
      git ls-tree -r -z --full-tree "$REV" -- internal/daemon/ui
      internal/daemon/ui.go internal/daemon/http.go
      internal/daemon/http_auth.go | shasum -a 256
    scope:
      - internal/daemon/ui
      - internal/daemon/ui.go
      - internal/daemon/http.go
      - internal/daemon/http_auth.go
    scope_semantics: >-
      Directory entries are recursive, so a newly added file below
      internal/daemon/ui changes the digest even when it is not yet named in
      files below. Entries are Git's NUL-delimited full-tree records, including
      mode, object type, blob object ID, and path in Git's deterministic order.
    value: 8c844f7a6d93bc762c7d1ce0a755916376586f8a981330ede928e707b9714496
  files:
    - path: internal/daemon/ui/index.html
      role: controls, summary tiles, org view, and table declarations
    - path: internal/daemon/ui/app.js
      role: requests, projections, refresh, connection, errors, and rendering
    - path: internal/daemon/ui/app_test.mjs
      role: model-tier and bounce-class behavior
    - path: internal/daemon/ui/styles.css
      role: responsive, focus, color, and overflow behavior
    - path: internal/daemon/ui.go
      role: embedded asset handler and redirect
    - path: internal/daemon/http.go
      role: route registration and read endpoint handlers
    - path: internal/daemon/http_auth.go
      role: unauthenticated static-shell exception
  api_routes:
    primary_collections:
      - GET /v1/instances
      - GET /v1/jobs
      - GET /v1/topology
    dynamic_enrichment:
      - GET /v1/resources?uri={resource_uri}
    notes:
      - >-
        app.js lines 48-52 declare the three primary collections.
      - >-
        app.js lines 104-155 collect resource URIs from those collections and
        fan out to the dynamic enrichment route.
      - >-
        The cutover requires no new daemon API; all four current route shapes
        remain behaviorally unchanged.

evidence_contract:
  state_in_this_slice: planned
  evidence_file_at_cutover: documentation/tui/cutover-evidence.yaml
  evidence_schema_at_cutover: agent-team.tui-cutover-evidence.v1
  covered_row_requires:
    - at least one canonical golden assertion
    - seeded live-daemon normalized-value parity assertion
  global_rows_may_share_evidence: true
  dropped_row_requires:
    - non-empty decision field
    - decision target resolves to an accepted architecture record

