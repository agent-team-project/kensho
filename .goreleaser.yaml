# goreleaser config — see https://goreleaser.com/customization/
#
# Local dry-run (no upload):
#   goreleaser release --snapshot --clean --skip=publish
#
# Real release: push a `v*` tag; .github/workflows/release.yml runs
# `goreleaser release --clean` against this config.
version: 2

project_name: agent-team

before:
  hooks:
    - go mod tidy

builds:
  - id: agent-team
    main: ./cmd/agent-team
    binary: agent-team
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/agent-team-project/agent-team/internal/cli.Version={{.Version}}

  - id: agent-teamd
    main: ./cmd/agent-teamd
    binary: agent-teamd
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}

archives:
  - id: agent-team
    ids:
      - agent-team
      - agent-teamd
    name_template: "agent-team_{{.Version}}_{{.Os}}_{{.Arch}}"
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE*
      - CLAUDE.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: git
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\(.+\))?!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\(.+\))?!?:.+$'
      order: 2
    - title: Chores
      regexp: '^.*?chore(\(.+\))?!?:.+$'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^Merge "
      - "^test:"

release:
  github:
    owner: agent-team-project
    name: kensho
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

